<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KoreanTama</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    background: #fdfdfd;
    font-family: 'DotGothic16', monospace;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  #world {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #creature-zone {
    position: relative;
    margin-top: 20vh;
  }

  #bird {
    width: 160px;
    height: 160px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background-image: url('sora/spritesheet.png');
    background-repeat: no-repeat;
    /* 12 cols * 160 = 1920, 6 rows * 160 = 960 */
    background-size: 1920px 960px;
    background-position: 0 0;
    cursor: pointer;
    position: relative;
    z-index: 2;
  }

  /* Thought bubble */
  #thought-bubble {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 8px;
    padding: 10px 14px;
    background: #fff;
    border: 3px solid #5a4e3c;
    border-radius: 16px 16px 16px 4px;
    white-space: nowrap;
    font-size: 16px;
    color: #5a4e3c;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 3;
    box-shadow: 2px 2px 0px #d4c9b8;
  }

  #thought-bubble.visible {
    opacity: 1;
    pointer-events: auto;
    cursor: pointer;
  }

  #thought-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 18px;
    width: 8px;
    height: 8px;
    background: #fff;
    border-right: 3px solid #5a4e3c;
    border-bottom: 3px solid #5a4e3c;
    border-radius: 0 0 4px 0;
    transform: rotate(45deg);
  }

  /* Food options */
  #food-menu {
    position: absolute;
    bottom: 70%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  #food-menu.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .food-option {
    background: #fffdf5;
    border: 3px solid #5a4e3c;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.1s ease;
    box-shadow: 2px 2px 0px #d4c9b8;
    white-space: nowrap;
  }

  .food-option.text-option {
    font-size: 18px;
    font-family: 'DotGothic16', monospace;
    color: #5a4e3c;
    padding: 8px 12px;
  }

  .food-option:hover {
    transform: translateY(-2px);
    background: #fff8e0;
  }

  .food-option:active {
    transform: translateY(1px);
    box-shadow: 0 0 0 #d4c9b8;
  }

  .food-option.wrong {
    animation: shake 0.4s ease;
    opacity: 0.4;
    pointer-events: none;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Pop text */
  .pop-text {
    position: absolute;
    font-family: 'DotGothic16', monospace;
    font-size: 20px;
    color: #e06060;
    pointer-events: none;
    white-space: nowrap;
    z-index: 5;
    animation: popUp 1.4s ease forwards;
  }

  @keyframes popUp {
    0% { opacity: 0; transform: translateX(-50%) translateY(0) scale(0.5); }
    15% { opacity: 1; transform: translateX(-50%) translateY(-10px) scale(1.1); }
    30% { transform: translateX(-50%) translateY(-16px) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-50px) scale(0.8); }
  }

  /* Background sparkles */
  .sparkle {
    position: absolute;
    pointer-events: none;
    z-index: 1;
  }

  .sparkle-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #b8a88a;
    border-radius: 1px;
    image-rendering: pixelated;
    animation: sparkleFade 0.5s ease forwards;
  }

  @keyframes sparkleFade {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* HUD — streak + daily progress */
  #hud {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    font-size: 13px;
    color: #5a4e3c;
    border-bottom: 3px solid #5a4e3c;
    background: #fffdf5;
    z-index: 20;
    letter-spacing: 0.5px;
  }

  #hud.goal-pulse {
    animation: hudPulse 1.5s ease;
  }

  @keyframes hudPulse {
    0%, 100% { text-shadow: none; }
    50% { text-shadow: 0 0 8px #b8a88a, 0 0 16px #d4c9b8; }
  }

  #hud-streak { white-space: nowrap; }
  #hud-progress { white-space: nowrap; letter-spacing: 2px; }
  #hud-debug {
    cursor: pointer;
    font-size: 14px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  #hud-debug:hover { opacity: 1; }

  /* Status bar */
  #status {
    position: absolute;
    bottom: 16px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 13px;
    color: #b8a88a;
    letter-spacing: 0.5px;
  }

  /* Egg wobble for hatching anticipation */
  @keyframes eggWobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
  }

  #bird.wobble {
    animation: eggWobble 0.4s ease-in-out;
  }

  /* Bird lapsed/faded state */
  #bird.lapsed {
    filter: saturate(0.3) brightness(0.85);
    transition: filter 0.5s ease;
  }

  /* HUD progress bar completion flash */
  @keyframes progressFlash {
    0%, 100% { background: #fffdf5; }
    50% { background: #fff8e0; }
  }

  #hud.goal-complete {
    animation: progressFlash 0.6s ease;
  }

  /* Debug menu modal */
  #debug-modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fffdf5;
    border: 3px solid #5a4e3c;
    border-radius: 12px;
    padding: 16px 20px;
    z-index: 100;
    text-align: center;
    font-size: 13px;
    color: #5a4e3c;
    box-shadow: 2px 2px 0px #d4c9b8;
    min-width: 220px;
  }
  #debug-modal.visible { display: block; }
  #debug-modal h3 {
    margin: 0 0 12px 0;
    font-size: 14px;
    font-weight: normal;
  }
  #debug-modal .debug-section {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #d4c9b8;
  }
  #debug-modal .debug-section:last-of-type {
    border-bottom: none;
    margin-bottom: 8px;
  }
  #debug-modal .debug-label {
    font-size: 11px;
    margin-bottom: 6px;
    opacity: 0.7;
  }
  #debug-modal button {
    background: #fffdf5;
    border: 2px solid #5a4e3c;
    border-radius: 8px;
    padding: 6px 12px;
    margin: 4px 2px;
    font-family: 'DotGothic16', monospace;
    font-size: 12px;
    color: #5a4e3c;
    cursor: pointer;
  }
  #debug-modal button:hover { background: #fff8e0; }
  #debug-modal button.active { background: #e8e0d0; }
  #debug-modal .level-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
  #debug-modal .level-buttons button { padding: 4px 8px; font-size: 11px; }
</style>
</head>
<body>
<div id="debug-modal">
  <h3>Debug Menu</h3>
  <div class="debug-section">
    <div class="debug-label">Set Progress Level</div>
    <div class="level-buttons" id="level-buttons"></div>
  </div>
  <div class="debug-section">
    <div class="debug-label">Data</div>
    <button id="debug-reset">Reset All Data</button>
  </div>
  <button id="debug-close">Close</button>
</div>
<div id="world">
  <div id="hud">
    <span id="hud-streak">Day 0</span>
    <span id="hud-progress"></span>
    <span id="hud-debug">*</span>
  </div>
  <div id="status"></div>
  <div id="creature-zone">
    <div id="thought-bubble">배고파...</div>
    <div id="food-menu"></div>
    <div id="bird"></div>
  </div>
</div>

<script>
const bird = document.getElementById('bird');
const thoughtBubble = document.getElementById('thought-bubble');
const foodMenu = document.getElementById('food-menu');
const world = document.getElementById('world');
const creatureZone = document.getElementById('creature-zone');
const statusEl = document.getElementById('status');

// Spritesheet: 1536x768, 12 cols x 6 rows, each frame 128x128
// Displayed at 160x160
const DISPLAY = 160;

const ANIMS = {
  eating:   { row: 0, frames: 12, speed: 150 },
  flying:   { row: 1, frames: 6, speed: 150 },
  hatching: { row: 2, frames: 7, speed: 700 },
  idle:     { row: 3, frames: 4, speed: 500 },
  pecking:  { row: 4, frames: 2, speed: 800 },
  walking:  { row: 5, frames: 4, speed: 200 },
};

// --- Word bank (8 categories, ~80 words) ---
const CATEGORIES = [
  { id: 'food', name: '음식', unlockAt: 0, words: [
    { korean: '사과', emoji: '🍎' }, { korean: '바나나', emoji: '🍌' },
    { korean: '빵', emoji: '🍞' }, { korean: '물', emoji: '💧' },
    { korean: '우유', emoji: '🥛' }, { korean: '딸기', emoji: '🍓' },
    { korean: '포도', emoji: '🍇' }, { korean: '수박', emoji: '🍉' },
    { korean: '주스', emoji: '🧃' }, { korean: '쿠키', emoji: '🍪' },
    { korean: '밥', emoji: '🍚' }, { korean: '케이크', emoji: '🍰' },
    { korean: '사탕', emoji: '🍬' }, { korean: '아이스크림', emoji: '🍦' },
    { korean: '차', emoji: '🍵' }, { korean: '복숭아', emoji: '🍑' },
    { korean: '옥수수', emoji: '🌽' }, { korean: '당근', emoji: '🥕' },
    { korean: '치즈', emoji: '🧀' }, { korean: '초콜릿', emoji: '🍫' },
  ]},
  { id: 'animals', name: '동물', unlockAt: 15, words: [
    { korean: '강아지', emoji: '🐕' }, { korean: '고양이', emoji: '🐱' },
    { korean: '토끼', emoji: '🐰' }, { korean: '새', emoji: '🐦' },
    { korean: '물고기', emoji: '🐟' }, { korean: '곰', emoji: '🐻' },
    { korean: '원숭이', emoji: '🐵' }, { korean: '호랑이', emoji: '🐯' },
    { korean: '코끼리', emoji: '🐘' }, { korean: '쥐', emoji: '🐭' },
  ]},
  { id: 'colors', name: '색깔', unlockAt: 30, words: [
    { korean: '빨간색', emoji: '🔴' }, { korean: '파란색', emoji: '🔵' },
    { korean: '노란색', emoji: '🟡' }, { korean: '초록색', emoji: '🟢' },
    { korean: '하얀색', emoji: '⚪' }, { korean: '까만색', emoji: '⚫' },
    { korean: '보라색', emoji: '🟣' }, { korean: '주황색', emoji: '🟠' },
  ]},
  { id: 'objects', name: '물건', unlockAt: 50, words: [
    { korean: '집', emoji: '🏠' }, { korean: '나무', emoji: '🌳' },
    { korean: '꽃', emoji: '🌸' }, { korean: '책', emoji: '📖' },
    { korean: '연필', emoji: '✏️' }, { korean: '가방', emoji: '🎒' },
    { korean: '시계', emoji: '⏰' }, { korean: '전화', emoji: '📱' },
    { korean: '열쇠', emoji: '🔑' }, { korean: '우산', emoji: '☂️' },
  ]},
  { id: 'weather', name: '날씨', unlockAt: 70, words: [
    { korean: '해', emoji: '☀️' }, { korean: '비', emoji: '🌧️' },
    { korean: '눈', emoji: '❄️' }, { korean: '구름', emoji: '☁️' },
    { korean: '바람', emoji: '🌬️' }, { korean: '번개', emoji: '⚡' },
    { korean: '무지개', emoji: '🌈' }, { korean: '별', emoji: '⭐' },
  ]},
  { id: 'body', name: '몸', unlockAt: 90, words: [
    { korean: '눈', emoji: '👁️' }, { korean: '코', emoji: '👃' },
    { korean: '입', emoji: '👄' }, { korean: '귀', emoji: '👂' },
    { korean: '손', emoji: '✋' }, { korean: '발', emoji: '🦶' },
    { korean: '머리', emoji: '🗣️' }, { korean: '하트', emoji: '❤️' },
  ]},
  { id: 'numbers', name: '숫자', unlockAt: 110, words: [
    { korean: '하나', emoji: '1️⃣' }, { korean: '둘', emoji: '2️⃣' },
    { korean: '셋', emoji: '3️⃣' }, { korean: '넷', emoji: '4️⃣' },
    { korean: '다섯', emoji: '5️⃣' },
  ]},
  { id: 'actions', name: '동작', unlockAt: 135, words: [
    { korean: '먹다', emoji: '🍽️' }, { korean: '자다', emoji: '😴' },
    { korean: '걷다', emoji: '🚶' }, { korean: '달리다', emoji: '🏃' },
    { korean: '울다', emoji: '😢' }, { korean: '웃다', emoji: '😊' },
    { korean: '노래', emoji: '🎵' }, { korean: '춤', emoji: '💃' },
  ]},
];

// Flatten for quick lookup — each word gets a category ref
const WORDS = [];
CATEGORIES.forEach(cat => {
  cat.words.forEach(w => {
    WORDS.push({ korean: w.korean, emoji: w.emoji, category: cat.id });
  });
});

// Adjectives for phrase challenges (Task 9)
const ADJECTIVES = [
  { korean: '빨간', english: 'red' },
  { korean: '큰', english: 'big' },
  { korean: '작은', english: 'small' },
  { korean: '차가운', english: 'cold' },
  { korean: '뜨거운', english: 'hot' },
];

// --- State ---
let hunger = 100;
const HUNGER_DURATION = 90000; // 90 seconds to deplete (reconciled from 30s)
const HUNGER_TICK = 500;
const HUNGER_PER_TICK = (100 / HUNGER_DURATION) * HUNGER_TICK;
let dailyGoalMet = false; // halves hunger rate after goal met

let gameState = 'pre-hatch';
let currentAnim = null;
let currentFrame = 0;
let animTimer = null;
let isPlayingOneShot = false;
let foodMenuOpen = false;
let hatched = false;

let flyTimer = null;
let walkTimer = null;

const FLY_MIN_DELAY = 8000;
const FLY_MAX_DELAY = 20000;
const WALK_MIN_DELAY = 5000;
const WALK_MAX_DELAY = 12000;

// --- Quiz state ---
let currentQuizWord = null;
let streak = 0;
let isReverseQuiz = false;
let isPhraseQuiz = false;
let phraseAdjective = null;

// --- Session & streak persistence ---
let wordStats = {};
let session = {
  lastPlayedDate: null,
  currentStreak: 0,
  bestStreak: 0,
  dailyCorrectCount: 0,
  dailyGoal: 10,
  hatched: false,
};
let returnType = 'first-time'; // 'first-time' | 'same-day' | 'new-day' | 'lapsed'

function getTodayStr() {
  return new Date().toISOString().slice(0, 10);
}

function loadStats() {
  try {
    const saved = localStorage.getItem('koreanTamaStats');
    if (saved) wordStats = JSON.parse(saved);
  } catch (e) { /* ignore */ }
}

function loadSession() {
  try {
    const saved = localStorage.getItem('koreanTamaSession');
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(session, s);
    }
  } catch (e) { /* ignore */ }

  const today = getTodayStr();
  if (!session.lastPlayedDate) {
    returnType = 'first-time';
  } else if (session.lastPlayedDate === today) {
    returnType = 'same-day';
  } else {
    // Check if yesterday
    const last = new Date(session.lastPlayedDate + 'T00:00:00');
    const now = new Date(today + 'T00:00:00');
    const diffDays = Math.round((now - last) / 86400000);
    if (diffDays === 1) {
      returnType = 'new-day';
      session.currentStreak++;
      if (session.currentStreak > session.bestStreak) {
        session.bestStreak = session.currentStreak;
      }
    } else {
      returnType = 'lapsed';
      session.currentStreak = 0;
    }
    session.dailyCorrectCount = 0;
  }
  session.lastPlayedDate = today;
  hatched = session.hatched;
  saveSession();
}

function saveStats() {
  try {
    localStorage.setItem('koreanTamaStats', JSON.stringify(wordStats));
  } catch (e) { /* ignore */ }
}

function saveSession() {
  try {
    localStorage.setItem('koreanTamaSession', JSON.stringify(session));
  } catch (e) { /* ignore */ }
}

function getStats(korean) {
  if (!wordStats[korean]) wordStats[korean] = { correctCount: 0, correctStreak: 0, lastSeen: 0, interval: 0 };
  return wordStats[korean];
}

function getTotalCorrect() {
  return Object.values(wordStats).reduce((sum, s) => sum + s.correctCount, 0);
}

function getUnlockedCategories() {
  const total = getTotalCorrect();
  return CATEGORIES.filter(c => total >= c.unlockAt);
}

function getUnlockedWords() {
  const unlocked = getUnlockedCategories();
  return WORDS.filter(w => unlocked.some(c => c.id === w.category));
}

loadStats();
loadSession();

// --- Sprite animation ---

function setFrame(anim, frame) {
  const a = ANIMS[anim];
  bird.style.backgroundPosition = `${-frame * DISPLAY}px ${-a.row * DISPLAY}px`;
}

function playLoop(animName) {
  if (animTimer) clearInterval(animTimer);
  currentAnim = animName;
  currentFrame = 0;
  const a = ANIMS[animName];
  setFrame(animName, 0);
  animTimer = setInterval(() => {
    currentFrame = (currentFrame + 1) % a.frames;
    setFrame(animName, currentFrame);
  }, a.speed);
}

function playOnce(animName, callback) {
  if (animTimer) clearInterval(animTimer);
  isPlayingOneShot = true;
  currentAnim = animName;
  currentFrame = 0;
  const a = ANIMS[animName];
  setFrame(animName, 0);
  let frame = 0;
  animTimer = setInterval(() => {
    frame++;
    if (frame >= a.frames) {
      clearInterval(animTimer);
      animTimer = null;
      isPlayingOneShot = false;
      if (callback) callback();
      return;
    }
    setFrame(animName, frame);
  }, a.speed);
}

function playNTimes(animName, n, callback) {
  let count = 0;
  function next() {
    count++;
    if (count >= n) { if (callback) callback(); return; }
    playOnce(animName, next);
  }
  playOnce(animName, next);
}

// --- State machine ---

function enterState(state) {
  gameState = state;

  switch (state) {
    case 'idle':
      playLoop('idle');
      scheduleFly();
      scheduleWalk();
      break;
    case 'hungry':
      playLoop('pecking');
      cancelFly();
      cancelWalk();
      break;
    case 'flying':
      doFly();
      break;
    case 'walking':
      doWalk();
      break;
    case 'eating':
      cancelFly();
      cancelWalk();
      break;
  }
}

function decideDefaultState() {
  if (hunger < 40) {
    enterState('hungry');
  } else {
    enterState('idle');
  }
}

// --- Flying ---

function scheduleFly() {
  cancelFly();
  const delay = FLY_MIN_DELAY + Math.random() * (FLY_MAX_DELAY - FLY_MIN_DELAY);
  flyTimer = setTimeout(() => {
    if (gameState === 'idle' && !isPlayingOneShot && hunger >= 40) {
      enterState('flying');
    }
  }, delay);
}

function cancelFly() {
  if (flyTimer) { clearTimeout(flyTimer); flyTimer = null; }
}

function doFly() {
  cancelWalk();
  playLoop('flying');

  const dx = (Math.random() - 0.5) * 180;
  const dy = -(40 + Math.random() * 60);

  // Flip to face flying direction
  bird.style.transform = dx > 0 ? 'scaleX(-1)' : 'scaleX(1)';

  creatureZone.style.transition = 'transform 1.5s ease-in-out';
  creatureZone.style.transform = `translate(${dx}px, ${dy}px)`;

  setTimeout(() => {
    // Flip to face return direction
    bird.style.transform = dx > 0 ? 'scaleX(1)' : 'scaleX(-1)';
    creatureZone.style.transform = 'translate(0, 0)';
    setTimeout(() => {
      creatureZone.style.transition = '';
      bird.style.transform = 'scaleX(1)';  // Reset to default
      decideDefaultState();
    }, 1500);
  }, 1800);
}

// --- Walking ---

function scheduleWalk() {
  cancelWalk();
  const delay = WALK_MIN_DELAY + Math.random() * (WALK_MAX_DELAY - WALK_MIN_DELAY);
  walkTimer = setTimeout(() => {
    if (gameState === 'idle' && !isPlayingOneShot && hunger >= 40) {
      // Randomly choose between flying and walking
      if (Math.random() < 0.5) {
        enterState('walking');
      } else {
        enterState('flying');
      }
    }
  }, delay);
}

function cancelWalk() {
  if (walkTimer) { clearTimeout(walkTimer); walkTimer = null; }
}

function doWalk() {
  cancelFly();
  playLoop('walking');

  // Walk horizontally (left or right)
  const dx = (Math.random() < 0.5 ? -1 : 1) * (60 + Math.random() * 80);

  // Flip bird to face walking direction (sprite faces left by default)
  bird.style.transform = dx > 0 ? 'scaleX(-1)' : 'scaleX(1)';

  creatureZone.style.transition = 'transform 1.2s linear';
  creatureZone.style.transform = `translate(${dx}px, 0)`;

  setTimeout(() => {
    // Flip to face return direction (opposite of initial)
    bird.style.transform = dx > 0 ? 'scaleX(1)' : 'scaleX(-1)';
    creatureZone.style.transform = 'translate(0, 0)';
    setTimeout(() => {
      creatureZone.style.transition = '';
      bird.style.transform = 'scaleX(1)';  // Reset to default
      decideDefaultState();
    }, 1200);
  }, 1400);
}

// --- Hunger ---

function updateStatus() {
  if (!hatched) return;
  const hearts = Math.ceil(hunger / 20);
  statusEl.textContent = '♥'.repeat(hearts) + '♡'.repeat(5 - hearts);
}

function updateHUD() {
  const streakEl = document.getElementById('hud-streak');
  const progressEl = document.getElementById('hud-progress');
  if (!streakEl || !progressEl) return;
  streakEl.textContent = 'Day ' + session.currentStreak;
  const done = Math.min(session.dailyCorrectCount, session.dailyGoal);
  const remaining = session.dailyGoal - done;
  progressEl.textContent = '■'.repeat(done) + '□'.repeat(remaining);
}

function updateThought() {
  if (!hatched) return;
  if (hunger < 40 && gameState !== 'eating') {
    if (!currentQuizWord) {
      startQuiz();
    }
  } else {
    thoughtBubble.classList.remove('visible');
    thoughtBubble.style.fontSize = '';
    closeFoodMenu();
    currentQuizWord = null;
    isReverseQuiz = false;
    isPhraseQuiz = false;
    phraseAdjective = null;
  }
}

setInterval(() => {
  if (!hatched || hunger <= 0) return;
  const wasOk = hunger >= 40;
  // After daily goal met, bird is content — halve hunger depletion rate
  const rate = dailyGoalMet ? HUNGER_PER_TICK * 0.5 : HUNGER_PER_TICK;
  hunger = Math.max(0, hunger - rate);
  updateStatus();
  updateThought();

  if (wasOk && hunger < 40 && gameState === 'idle') {
    enterState('hungry');
  }

}, HUNGER_TICK);

// --- Speech ---

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

// --- Quiz & Food ---

function pickQuizWord() {
  const unlocked = getUnlockedWords();
  const now = Date.now();

  // Split into review-due and new words
  const reviewDue = [];
  const newWords = [];
  unlocked.forEach(w => {
    const s = getStats(w.korean);
    if (s.correctCount === 0) {
      newWords.push(w);
    } else if (now - s.lastSeen > s.interval) {
      reviewDue.push(w);
    }
  });

  // 60% review / 40% new when both available
  let pool;
  if (reviewDue.length > 0 && newWords.length > 0) {
    pool = Math.random() < 0.6 ? reviewDue : newWords;
  } else if (reviewDue.length > 0) {
    pool = reviewDue;
  } else if (newWords.length > 0) {
    pool = newWords;
  } else {
    pool = unlocked; // all reviewed and not yet due — pick any
  }

  // Weighted random within pool: lower correctStreak = higher weight
  const weights = pool.map(w => {
    const s = getStats(w.korean);
    return Math.max(1, 6 - s.correctStreak);
  });
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * totalWeight;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
}

function pickDistractors(correct, count) {
  const unlocked = getUnlockedWords().filter(w => w.emoji !== correct.emoji);
  // Prefer same-category distractors when possible
  const sameCategory = unlocked.filter(w => w.category === correct.category);
  const shuffledSame = [...sameCategory].sort(() => Math.random() - 0.5);
  const shuffledOther = [...unlocked.filter(w => w.category !== correct.category)].sort(() => Math.random() - 0.5);
  const pool = [...shuffledSame, ...shuffledOther];
  return pool.slice(0, count);
}

function buildFoodMenu() {
  foodMenu.innerHTML = '';
  if (!currentQuizWord) return;

  const distractors = pickDistractors(currentQuizWord, 2);
  const options = [currentQuizWord, ...distractors].sort(() => Math.random() - 0.5);

  options.forEach(word => {
    const btn = document.createElement('button');
    btn.className = 'food-option';

    if (isReverseQuiz) {
      // Reverse mode: show Korean text instead of emoji
      btn.classList.add('text-option');
      btn.textContent = word.korean;
    } else {
      btn.textContent = word.emoji;
    }

    btn.dataset.emoji = word.emoji;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isPlayingOneShot) return;
      handleAnswer(word, btn);
    });
    foodMenu.appendChild(btn);
  });
}

function openFoodMenu() {
  foodMenuOpen = true;
  buildFoodMenu();
  foodMenu.classList.add('visible');
}

function closeFoodMenu() {
  foodMenuOpen = false;
  foodMenu.classList.remove('visible');
  foodMenu.innerHTML = '';
}

function handleAnswer(chosen, btn) {
  const isCorrect = chosen.emoji === currentQuizWord.emoji;

  if (isCorrect) {
    // Correct!
    const prevCats = getUnlockedCategories().map(c => c.id);

    const stats = getStats(currentQuizWord.korean);
    stats.correctCount++;
    stats.correctStreak++;
    stats.lastSeen = Date.now();
    stats.interval = Math.min(Math.max((stats.interval || 0) * 2 || 30000, 30000), 86400000);
    streak++;

    // Track daily progress
    session.dailyCorrectCount++;
    const justMetGoal = !dailyGoalMet && session.dailyCorrectCount >= session.dailyGoal;
    if (justMetGoal) dailyGoalMet = true;

    saveStats();
    saveSession();

    const newCats = getUnlockedCategories().map(c => c.id);
    const newlyUnlocked = CATEGORIES.find(c => newCats.includes(c.id) && !prevCats.includes(c.id));

    closeFoodMenu();
    thoughtBubble.classList.remove('visible');
    hunger = 100;
    gameState = 'eating';
    cancelFly();
    cancelWalk();

    // Handle lapsed bird restoration on first correct answer
    const wasLapsed = returnType === 'lapsed';
    if (wasLapsed) {
      bird.classList.remove('lapsed');
      ANIMS.idle.speed = 500;
      returnType = 'restored';
    }

    playOnce('eating', () => {
      if (wasLapsed) {
        // Bird restored — celebration
        showPop('다시 만나서 반가워!', true);
        updateStatus();
        updateHUD();
        setTimeout(() => enterState('flying'), 600);
      } else if (newlyUnlocked) {
        // Category unlock! Show category name + preview emoji
        const preview = newlyUnlocked.words.slice(0, 3).map(w => w.emoji).join('');
        showPop(newlyUnlocked.name + '! ' + preview);
        speak(newlyUnlocked.name);
        updateStatus();
        updateHUD();
        setTimeout(() => enterState('flying'), 600);
      } else if (justMetGoal) {
        // Daily goal met!
        showPop('잘했어!', true);
        updateStatus();
        updateHUD();
        // Pulse the streak counter
        const hudEl = document.getElementById('hud');
        if (hudEl) { hudEl.classList.add('goal-pulse'); setTimeout(() => hudEl.classList.remove('goal-pulse'), 1500); }
        setTimeout(() => enterState('flying'), 600);
      } else {
        showPop('맛있어!', true);
        updateStatus();
        updateHUD();

        // Streak bonus: fly when 3+ in a row
        if (streak >= 3) {
          streak = 0;
          setTimeout(() => enterState('flying'), 600);
        } else {
          decideDefaultState();
        }
      }
    });

    currentQuizWord = null;
    isReverseQuiz = false;
    isPhraseQuiz = false;
    phraseAdjective = null;
    thoughtBubble.style.fontSize = '';
  } else {
    // Wrong — shake the button, repeat more insistently
    btn.classList.add('wrong');
    const stats = getStats(currentQuizWord.korean);
    stats.correctStreak = 0;
    stats.lastSeen = Date.now();
    stats.interval = 30000; // reset interval on wrong
    saveStats();
    streak = 0;

    // Bird repeats itself
    if (isPhraseQuiz && phraseAdjective) {
      const phrase = phraseAdjective.korean + ' ' + currentQuizWord.korean + '!';
      thoughtBubble.textContent = phrase;
      speak(phrase);
    } else {
      thoughtBubble.textContent = currentQuizWord.korean + '!';
      speak(currentQuizWord.korean);
    }
    thoughtBubble.classList.add('visible');
  }
}

function startQuiz() {
  currentQuizWord = pickQuizWord();
  isReverseQuiz = false;
  isPhraseQuiz = false;
  phraseAdjective = null;

  const stats = getStats(currentQuizWord.korean);

  // Phrase challenge: 20% chance if correctCount >= 5 and not an action word
  if (stats.correctCount >= 5 && currentQuizWord.category !== 'actions' && Math.random() < 0.2) {
    isPhraseQuiz = true;
    phraseAdjective = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
    const phrase = phraseAdjective.korean + ' ' + currentQuizWord.korean + ' 주세요!';
    thoughtBubble.textContent = phrase;
    thoughtBubble.classList.add('visible');
    speak(phrase);
    return;
  }

  // Reverse quiz: 30% chance if correctCount >= 3
  const reverseEligible = getUnlockedWords().filter(w => getStats(w.korean).correctCount >= 3);
  if (reverseEligible.length >= 3 && stats.correctCount >= 3 && Math.random() < 0.3) {
    isReverseQuiz = true;
    // Show emoji in thought bubble, speak Korean word
    thoughtBubble.textContent = currentQuizWord.emoji;
    thoughtBubble.style.fontSize = '36px';
    thoughtBubble.classList.add('visible');
    speak(currentQuizWord.korean);
    return;
  }

  // Normal quiz
  const requestText = currentQuizWord.korean + ' 주세요!';
  thoughtBubble.textContent = requestText;
  thoughtBubble.style.fontSize = '';
  thoughtBubble.classList.add('visible');
  speak(requestText);
}

function showPop(text, sayIt) {
  const el = document.createElement('div');
  el.className = 'pop-text';
  el.textContent = text;
  el.style.left = '50%';
  el.style.bottom = '100%';
  creatureZone.appendChild(el);
  setTimeout(() => el.remove(), 1400);
  if (sayIt) speak(text);
}

// --- Interactions ---

// Click bird -> fly or open food menu
bird.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (!hatched) return;
  if (isPlayingOneShot || gameState === 'flying' || gameState === 'walking') return;

  if (hunger < 40 || foodMenuOpen) {
    if (foodMenuOpen) closeFoodMenu();
    else openFoodMenu();
  } else {
    enterState('flying');
  }
});

// Prevent click from double-firing after mousedown
bird.addEventListener('click', (e) => {
  e.stopPropagation();
});

// Tap thought bubble to hear it again
thoughtBubble.addEventListener('click', (e) => {
  e.stopPropagation();
  if (currentQuizWord) {
    speak(thoughtBubble.textContent);
  }
});

// Background sparkles
world.addEventListener('click', (e) => {
  if (e.target.closest('#creature-zone')) return;
  createSparkle(e.clientX, e.clientY);
});

function createSparkle(x, y) {
  const c = document.createElement('div');
  c.className = 'sparkle';
  c.style.left = x + 'px';
  c.style.top = y + 'px';
  const n = 5 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const dot = document.createElement('div');
    dot.className = 'sparkle-dot';
    const angle = (Math.PI * 2 * i) / n + (Math.random() - 0.5) * 0.5;
    const dist = 12 + Math.random() * 18;
    dot.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    dot.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    dot.style.animationDelay = (Math.random() * 0.1) + 's';
    const colors = ['#b8a88a', '#c9b99a', '#a8987a', '#d4c4a4'];
    dot.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.appendChild(dot);
  }
  world.appendChild(c);
  setTimeout(() => c.remove(), 600);
}

// --- Hatching sequence ---

function startHatching() {
  gameState = 'pre-hatch';
  statusEl.textContent = '...?';

  // Show egg (first hatching frame)
  setFrame('hatching', 0);

  // Wobble the egg a few times, then hatch
  let wobbles = 0;
  const maxWobbles = 3;

  function wobble() {
    bird.classList.add('wobble');
    bird.addEventListener('animationend', function handler() {
      bird.removeEventListener('animationend', handler);
      bird.classList.remove('wobble');
      wobbles++;
      if (wobbles < maxWobbles) {
        setTimeout(wobble, 800 + Math.random() * 400);
      } else {
        setTimeout(hatch, 500);
      }
    });
  }

  // Full-screen tap overlay to unlock audio and start hatching
  function waitForTap() {
    statusEl.textContent = 'tap the egg!';
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;cursor:pointer;';
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function onTap() {
      overlay.remove();
      // Speak a brief dot to unlock speechSynthesis in this gesture
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance('.');
        u.lang = 'ko-KR';
        u.volume = 0.01;
        speechSynthesis.speak(u);
      }
      statusEl.textContent = '...?';
      setTimeout(wobble, 400);
    });
  }

  // Show egg, then wait for user interaction
  waitForTap();

  function hatch() {
    gameState = 'hatching';
    playOnce('hatching', () => {
      hatched = true;
      session.hatched = true;
      saveSession();
      showPop('안녕!', true);
      updateStatus();
      decideDefaultState();
    });
  }
}

// --- Debug menu ---
(function() {
  const debugBtn = document.getElementById('hud-debug');
  const modal = document.getElementById('debug-modal');
  const levelBtnsContainer = document.getElementById('level-buttons');

  // Build level buttons based on category unlock thresholds
  const levels = [
    { label: '0', value: 0 },
    ...CATEGORIES.filter(c => c.unlockAt > 0).map(c => ({ label: c.name, value: c.unlockAt }))
  ];

  levels.forEach(level => {
    const btn = document.createElement('button');
    btn.textContent = level.label;
    btn.title = 'Set progress to ' + level.value;
    btn.addEventListener('click', () => {
      setProgressLevel(level.value);
    });
    levelBtnsContainer.appendChild(btn);
  });

  function setProgressLevel(targetTotal) {
    // Distribute correctCount across words to reach target total
    const allWords = WORDS;
    let remaining = targetTotal;

    // Reset all stats first
    wordStats = {};

    // Distribute evenly across unlocked words up to target
    for (let i = 0; i < allWords.length && remaining > 0; i++) {
      const count = Math.min(remaining, 5); // max 5 per word for even distribution
      wordStats[allWords[i].korean] = {
        correctCount: count,
        correctStreak: count,
        lastSeen: Date.now(),
        interval: 30000
      };
      remaining -= count;
    }

    saveStats();
    updateHUD();
    modal.classList.remove('visible');

    // Show feedback
    const total = getTotalCorrect();
    const unlocked = getUnlockedCategories();
    console.log('Progress set to ' + total + ', unlocked: ' + unlocked.map(c => c.name).join(', '));
  }

  debugBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    modal.classList.add('visible');
  });

  document.getElementById('debug-reset').addEventListener('click', () => {
    if (confirm('Reset all progress data?')) {
      localStorage.removeItem('koreanTamaStats');
      localStorage.removeItem('koreanTamaSession');
      location.reload();
    }
  });

  document.getElementById('debug-close').addEventListener('click', () => {
    modal.classList.remove('visible');
  });
})();

// --- Return states ---
function handleReturnState() {
  updateStatus();

  if (returnType === 'lapsed') {
    // Bird is faded/lonely — slower idle
    bird.classList.add('lapsed');
    ANIMS.idle.speed = 800; // slower idle
    playLoop('idle');
    scheduleFly();
    scheduleWalk();
    gameState = 'idle';
    // Thought bubble after 1s
    setTimeout(() => {
      thoughtBubble.textContent = '...보고 싶었어';
      thoughtBubble.classList.add('visible');
      speak('보고 싶었어');
    }, 1000);
  } else if (returnType === 'new-day') {
    // Streak continues — excited bird
    ANIMS.idle.speed = 500; // normal speed
    playOnce('pecking', () => {
      showPop('좋은 아침!', true);
      playOnce('flying', () => {
        decideDefaultState();
      });
    });
  } else {
    // Same day or first time after hatch — just resume
    ANIMS.idle.speed = 500;
    decideDefaultState();
  }
}

// --- Init ---
dailyGoalMet = session.dailyCorrectCount >= session.dailyGoal;
updateHUD();

if (hatched) {
  // Already hatched — skip egg sequence, handle return states
  handleReturnState();
} else {
  startHatching();
}
</script>
